defaults:
  - base
  - _self_

experiment:
  name: dqn_big_intersection
  seed: 42
  total_timesteps: 100000
  eval_episodes: 1

env:
  factory: sumo_env
  kwargs:
    net_file: sumo_rl/nets/big-intersection/big-intersection.net.xml
    route_file: sumo_rl/nets/big-intersection/routes.rou.xml
    single_agent: true
    use_gui: true
    num_seconds: 5400
    yellow_time: 4
    min_green: 5
    max_green: 60

algorithm:
  kind: dqn_sb3
  params:
    policy: MlpPolicy
    learning_rate: 0.001
    learning_starts: 0
    buffer_size: 50000
    train_freq: 1
    target_update_interval: 500
    exploration_fraction: 0.05
    exploration_final_eps: 0.01

