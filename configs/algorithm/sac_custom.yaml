# @package _global_
algorithm:
  kind: sac_custom
  params:
    policy_mode: independent
    actor_lr: 0.0003
    critic_lr: 0.0003
    alpha_lr: 0.0003
    tau: 0.005
    train_batch_size_per_learner: 256
    num_env_runners: 0
    num_envs_per_env_runner: 1
    num_gpus_per_learner: auto
    ray_num_gpus: auto
    num_steps_sampled_before_learning_starts: 1000
    model_config:
      architecture_tag: custom_sac_mlp
      actor:
        encoder:
          type: mlp
          hidden_dims: [256, 256]
          activation: tanh
        head:
          hidden_dims: []
          activation: relu
      critic:
        encoder:
          type: mlp
          hidden_dims: [256, 256]
          activation: tanh
        head:
          hidden_dims: []
          activation: relu
        twin_q: true
      communication:
        enabled: false
        type: none
        apply_to: [actor, critic]
        scope: module
