# @package _global_
algorithm:
  kind: baselinev1_rllib
  params:
    algo: SAC
    max_iters: 50
    stop_timesteps: 0
    num_workers: 0
    rollout_fragment_length: 128
    train_batch_size: 512
    replay_capacity: 50000
    learning_starts: 1000
    gamma: 0.95
    tau: 0.005
    initial_alpha: 0.2
    target_entropy: auto
    lr: 0.0003
    critic_lr: 0.0
    alpha_lr: 0.0
    lambda: 0.9
    clip_param: 0.4
    entropy_coeff: 0.01
    vf_loss_coeff: 0.25
    sgd_minibatch_size: 64
    num_sgd_iter: 10
    hidden_dim: 64
    latent_dim: 64
    fusion_dim: 64
    actor_hidden: 128
    value_hidden: 128
    heads: 2
    dropout: 0.1
    add_self_loops: false
    no_normalize_edge_attr: false
    num_gpus: auto
    ray_address: ""
    ray_local_mode: false
    log_level: ERROR
    checkpoint_freq: 0
    checkpoint_at_end: false
    experiment_name: ""
    storage_path: ""
    tune_verbose: 1
    wandb_env_file: .env
    reward_fn: ""
