# @package _global_
algorithm:
  kind: dqn_rllib
  params:
    policy_mode: independent
    lr: 0.0005
    gamma: 0.99
    train_batch_size_per_learner: 32
    num_env_runners: 0
    num_envs_per_env_runner: 1
    num_gpus_per_learner: auto
    ray_num_gpus: auto
    num_steps_sampled_before_learning_starts: 1000
    target_network_update_freq: 500
