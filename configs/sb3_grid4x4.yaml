defaults:
  - base
  - _self_

experiment:
  name: sb3_grid4x4
  seed: 42
  total_timesteps: 50000
  eval_episodes: 1

env:
  factory: grid4x4
  kwargs:
    use_gui: true
    out_csv_name: null
    virtual_display:
      - 3200
      - 1800

algorithm:
  kind: ppo_sb3
  params:
    policy: MlpPolicy
    gamma: 0.95
    n_steps: 256
    ent_coef: 0.0905168
    learning_rate: 0.00062211
    vf_coef: 0.042202
    max_grad_norm: 0.9
    gae_lambda: 0.99
    n_epochs: 5
    clip_range: 0.3
    batch_size: 256
    num_envs: 2

