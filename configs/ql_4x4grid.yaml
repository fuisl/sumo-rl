defaults:
  - base
  - _self_

experiment:
  name: ql_4x4grid
  seed: 42
  runs: 30
  episodes: 4
  fixed_ts: false

env:
  factory: sumo_env
  kwargs:
    net_file: sumo_rl/nets/RESCO/grid4x4/grid4x4.net.xml
    route_file: sumo_rl/nets/RESCO/grid4x4/grid4x4_1.rou.xml
    single_agent: false
    use_gui: false
    num_seconds: 80000
    min_green: 5
    delta_time: 5

algorithm:
  kind: q_learning
  params:
    alpha: 0.1
    gamma: 0.99
    epsilon: 0.05
    min_epsilon: 0.005
    decay: 1.0
