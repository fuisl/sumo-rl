defaults:
  - logging: wandb
  - _self_

experiment:
  name: base
  project: marl-traffic-gat
  group: null
  tags: []
  seed: 42
  runs: 1
  episodes: 1
  episode_seconds: 1000
  eval_episodes: 1
  eval_seeds: null
  fixed_ts: false

env:
  factory: sumo_env
  kwargs:
    add_system_info: true
    add_per_agent_info: true
    tripinfo_output_name: null

algorithm:
  kind: static_max_pressure
  params: {}

hydra:
  run:
    dir: outputs/${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
